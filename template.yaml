AWSTemplateFormatVersion: 2010-09-09
Transform: AWS::Serverless-2016-10-31
Description: Core components for the Identity Reuse Service

Parameters:
  Environment:
    Type: String
    AllowedValues:
      - local
      - dev
      - build
      - staging
      - integration
      - production
    Default: local
  ApiStageName:
    Description: The stage name of the API
    Type: String
    Default: v1
  CSLSSubscriptionEndpointArn:
    Type: String
    Description: CSLS Subscription endpoint
    Default: "arn:aws:logs:eu-west-2:885513274347:destination:csls_cw_logs_destination_prodpython-2"
  ApplicationName:
    Description: The name of the application
    Type: String
    Default: id-reuse-service

  ApplicationConfigName:
    Description: The name of the applications configuration
    Type: String
    Default: id-reuse-config

  ComponentId:
    Description: The component id
    Type: String
    Default: https://identity.account.gov.uk/sis

  OwnerTagValue:
    Description: Value for the Owner Tag
    Type: String
    Default: trust_and_reuse@digital.cabinet-office.gov.uk

  ProductTagValue:
    Description: Value for the Product Tag
    Type: String
    Default: GOV.UK One Login

  SourceTagValue:
    Description: Value for the Source Tag
    Type: String
    Default: govuk-one-login/ipv-identity-reuse-service/template.yaml

  SystemTagValue:
    Description: Value for the System Tag
    Type: String
    Default: Re-use identity service

  CodeSigningConfigArn:
    Type: String
    Description: The ARN of the Code Signing Config to use, provided by the deployment pipeline
    Default: none

  PermissionsBoundary:
    Type: String
    Description: The ARN of the permissions boundary to apply to any role created by the template
    Default: none

  VpcStackName:
    Description: VPC Stack name
    Type: String
    Default: vpc

  DynatraceNodeLayerArn:
    Type: String
    Description: The ARN of the OneAgent Node layer for Lambda Node functions
    Default: "arn:aws:lambda:eu-west-2:216552277552:layer:Dynatrace_OneAgent_1_313_2_20250404-043044_with_collector_nodejs:1"

  LogGroupRetentionInDays:
    Description: The number of days a log group should retain logs
    Type: Number
    MinValue: "1"
    Default: "30"

  LambdaDeploymentPreference:
    Description: "Specifies the configuration to enable gradual Lambda deployments."
    Type: String
    Default: "AllAtOnce"
    AllowedValues:
      - AllAtOnce
      - Canary10Percent5Minutes
      - Canary10Percent10Minutes
      - Canary10Percent15Minutes
      - Canary10Percent30Minutes
      - Linear10PercentEvery10Minutes
      - Linear10PercentEvery1Minute
      - Linear10PercentEvery2Minutes
      - Linear10PercentEvery3Minutes
      - LambdaCanary50Percent5Minutes

  SharedStackName:
    Description: The name of the Identity Reuse Service Shared Stack
    Type: String
    Default: reuse-identity-shared

  MainCloudWatchMetricNamespace:
    Description: The name of the metric namespace
    Type: String
    Default: IdentityReuseService

  MainStackName:
    Description: The name of the Main VC Storage stack
    Type: String
    Default: identity-reuse-service-main

  AppConfigStackName:
    Description: The name of the App Config stack
    Type: String
    Default: sis-app-config-deploy

Mappings:
  EnvironmentMap:
    "local":
      txmaAccountId: "275907361037"
      dynatraceSecretArn: "arn:aws:secretsmanager:eu-west-2:216552277552:secret:DynatraceNonProductionVariables"
      messageQueueArn: "unused"
      messageQueueKeyArn: "unused"
      ApiRateLimit: 5 # allowed requests per second
      ApiBurstLimit: 5 # requests the API can handle concurrently
      DevOrchestrationVPCID: vpc-0ef7e5d033cabd99f
      PerformanceTestApiRateLimit: 0 # not used in this environment
      PerformanceTestApiBurstLimit: 0 # not used in this environment
      IPVCoreVPCID: none # Not used in dev
      UniqueVPCEndpointIDs: none
      UseCanary: false
    "dev":
      txmaAccountId: "275907361037"
      dynatraceSecretArn: "arn:aws:secretsmanager:eu-west-2:216552277552:secret:DynatraceNonProductionVariables"
      messageQueueArn: "unused"
      messageQueueKeyArn: "unused"
      ApiRateLimit: 5 # allowed requests per second
      ApiBurstLimit: 5 # requests the API can handle concurrently
      DevOrchestrationVPCID: vpc-0ef7e5d033cabd99f
      PerformanceTestApiRateLimit: 0 # not used in this environment
      PerformanceTestApiBurstLimit: 0 # not used in this environment
      IPVCoreVPCID: none # Not used in dev
      UniqueVPCEndpointIDs: none
      UseCanary: false
    "build":
      txmaAccountId: "779873699903"
      dynatraceSecretArn: "arn:aws:secretsmanager:eu-west-2:216552277552:secret:DynatraceNonProductionVariables"
      messageQueueArn: "unused"
      messageQueueKeyArn: "unused"
      ApiRateLimit: 5 # allowed requests per second
      ApiBurstLimit: 5 # requests the API can handle concurrently
      DevOrchestrationVPCID: vpc-00e8a85efc283fe6f
      PerformanceTestApiRateLimit: 2000 # allowed requests per second
      PerformanceTestApiBurstLimit: 2000 # requests the API can handle concurrently
      IPVCoreVPCID: vpc-02e4eb3b0cffc08b0 # This is performance testing VPC ID
      UniqueVPCEndpointIDs: vpce-0edf9e66222007102 # IPV Build VPCE ID
      UseCanary: false
    "staging":
      txmaAccountId: "178023842775"
      dynatraceSecretArn: "arn:aws:secretsmanager:eu-west-2:216552277552:secret:DynatraceNonProductionVariables"
      messageQueueArn: "arn:aws:sqs:eu-west-2:178023842775:self-staging-EC-SQS-Output-Queue-identityreuse"
      messageQueueKeyArn: "arn:aws:kms:eu-west-2:178023842775:key/325458a5-de28-4c28-aaf0-678ebefb35ac"
      ApiRateLimit: 5 # allowed requests per second
      ApiBurstLimit: 5 # requests the API can handle concurrently
      PerformanceTestApiRateLimit: 0 # not used in this environment
      PerformanceTestApiBurstLimit: 0 # not used in this environment
      IPVCoreVPCID: vpc-039e664a2b3abb03e # ID Reuse Service Staging VPC ID
      UniqueVPCEndpointIDs: vpce-0cc0de10742b83b8a # IPV Staging VPCE ID
      UseCanary: true
    "integration":
      txmaAccountId: "729485541398"
      dynatraceSecretArn: "arn:aws:secretsmanager:eu-west-2:216552277552:secret:DynatraceNonProductionVariables"
      messageQueueArn: "arn:aws:sqs:eu-west-2:729485541398:self-integration-EC-SQS-Output-Queue-identityreuse"
      messageQueueKeyArn: "arn:aws:kms:eu-west-2:729485541398:key/c199c69c-7ce7-4a82-b5a7-b344c7ac04f5"
      ApiRateLimit: 2000 # allowed requests per second
      ApiBurstLimit: 2000 # requests the API can handle concurrently
      PerformanceTestApiRateLimit: 0 # not used in this environment
      PerformanceTestApiBurstLimit: 0 # not used in this environment
      IPVCoreVPCID: vpc-0a9e773e1f32b6697 # ID Reuse Service Integration VPC ID
      UniqueVPCEndpointIDs: vpce-0f47068fdf9ad0c3d # IPV Int VPCE ID
      UseCanary: true
    "production":
      txmaAccountId: "451773080033"
      dynatraceSecretArn: "arn:aws:secretsmanager:eu-west-2:216552277552:secret:DynatraceProductionVariables"
      messageQueueArn: "arn:aws:sqs:eu-west-2:451773080033:self-production-EC-SQS-Output-Queue-identityreuse"
      messageQueueKeyArn: "arn:aws:kms:eu-west-2:451773080033:key/5b5d3a8e-cf70-49ca-bec8-b3a2e61ce770"
      ApiRateLimit: 2000 # allowed requests per second
      ApiBurstLimit: 2000 # requests the API can handle concurrently
      PerformanceTestApiRateLimit: 0 # not used in this environment
      PerformanceTestApiBurstLimit: 0 # not used in this environment
      IPVCoreVPCID: vpc-0274d75007239691f # IPV Reuse Seruice Production VPC ID
      UniqueVPCEndpointIDs: vpce-0e40247a557c2169e # IPV Reuse Seruice Prod VPCE ID
      UseCanary: true

Conditions:
  UseCodeSigning:
    Fn::Not:
      - Fn::Equals:
          - !Ref CodeSigningConfigArn
          - none

  UsePermissionsBoundary:
    Fn::Not:
      - Fn::Equals:
          - !Ref PermissionsBoundary
          - none

  DynaTraceEnabled:
    Fn::Or:
      - Fn::Equals: [!Ref Environment, "build"]
      - Fn::Equals: [!Ref Environment, "staging"]
      - Fn::Equals: [!Ref Environment, "integration"]
      - Fn::Equals: [!Ref Environment, "production"]

  IsDev:
    Fn::Or:
      - Fn::Equals: [!Ref Environment, "local"]
      - Fn::Equals: [!Ref Environment, "dev"]

  IsNotDev: !Not [!Condition IsDev]

  IsNotDevOrBuild: !Not [!Condition IsDevOrBuild]

  CanariesEnabled: !Equals
    - !FindInMap [EnvironmentMap, !Ref Environment, UseCanary]
    - true

  IsDevOrBuild:
    Fn::Or:
      - Fn::Equals: [!Ref Environment, "local"]
      - Fn::Equals: [!Ref Environment, "dev"]
      - Fn::Equals: [!Ref Environment, "build"]

  IsBuild:
    Fn::Equals:
      - !Ref Environment
      - "build"

  IsNotProduction:
    Fn::Or:
      - Fn::Equals: [!Ref Environment, "local"]
      - Fn::Equals: [!Ref Environment, "dev"]
      - Fn::Equals: [!Ref Environment, "build"]
      - Fn::Equals: [!Ref Environment, "staging"]

  UseVpc:
    Fn::Not:
      - Fn::Equals: [!Ref VpcStackName, "none"]

Globals:
  Function:
    MemorySize: 1024
    Timeout: 30
    CodeUri: ./
    Runtime: nodejs20.x
    Architectures:
      - arm64
    Environment:
      Variables:
        AWS_LAMBDA_EXEC_WRAPPER: !If [DynaTraceEnabled, "/opt/dynatrace", !Ref "AWS::NoValue"]
        DT_CONNECTION_AUTH_TOKEN: !If
          - DynaTraceEnabled
          - !Sub
            - "{{resolve:secretsmanager:${SecretArn}:SecretString:DT_CONNECTION_AUTH_TOKEN}}"
            - SecretArn: !FindInMap [EnvironmentMap, !Ref Environment, dynatraceSecretArn]
          - !Ref "AWS::NoValue"
        DT_CONNECTION_BASE_URL: !If
          - DynaTraceEnabled
          - !Sub
            - "{{resolve:secretsmanager:${SecretArn}:SecretString:DT_CONNECTION_BASE_URL}}"
            - SecretArn: !FindInMap [EnvironmentMap, !Ref Environment, dynatraceSecretArn]
          - !Ref "AWS::NoValue"
        DT_CLUSTER_ID: !If
          - DynaTraceEnabled
          - !Sub
            - "{{resolve:secretsmanager:${SecretArn}:SecretString:DT_CLUSTER_ID}}"
            - SecretArn: !FindInMap [EnvironmentMap, !Ref Environment, dynatraceSecretArn]
          - !Ref "AWS::NoValue"
        DT_LOG_COLLECTION_AUTH_TOKEN: !If
          - DynaTraceEnabled
          - !Sub
            - "{{resolve:secretsmanager:${SecretArn}:SecretString:DT_LOG_COLLECTION_AUTH_TOKEN}}"
            - SecretArn: !FindInMap [EnvironmentMap, !Ref Environment, dynatraceSecretArn]
          - !Ref "AWS::NoValue"
        DT_TENANT: !If
          - DynaTraceEnabled
          - !Sub
            - "{{resolve:secretsmanager:${SecretArn}:SecretString:DT_TENANT}}"
            - SecretArn: !FindInMap [EnvironmentMap, !Ref Environment, dynatraceSecretArn]
          - !Ref "AWS::NoValue"
        DT_OPEN_TELEMETRY_ENABLE_INTEGRATION: !If [DynaTraceEnabled, "true", !Ref "AWS::NoValue"]
    CodeSigningConfigArn: !If
      - UseCodeSigning
      - !Ref CodeSigningConfigArn
      - !Ref AWS::NoValue
    PermissionsBoundary: !If
      - UsePermissionsBoundary
      - !Ref PermissionsBoundary
      - !Ref AWS::NoValue
    VpcConfig: !If
      - UseVpc
      - SecurityGroupIds:
          - Fn::ImportValue: !Sub "${VpcStackName}-AWSServicesEndpointSecurityGroupId"
        SubnetIds:
          - Fn::ImportValue: !Sub "${VpcStackName}-PrivateSubnetIdA"
          - Fn::ImportValue: !Sub "${VpcStackName}-PrivateSubnetIdB"
      - !Ref "AWS::NoValue"
    Tracing: Active
    AutoPublishAlias: live
    Layers: !If
      - DynaTraceEnabled
      - - !Ref DynatraceNodeLayerArn
      - !Ref AWS::NoValue
    DeploymentPreference:
      Type: !If
        - CanariesEnabled
        - !Ref LambdaDeploymentPreference
        - AllAtOnce
      Role: !GetAtt CodeDeployServiceRole.Arn
      Alarms:
        Fn::If:
          - CanariesEnabled
          - - !Ref LambdaErrorAlarm
          - - !Ref "AWS::NoValue"

Resources:
  ################################
  # AUTHORIZATION LAMBDA         #
  ################################

  AuthorizationFunction:
    Type: AWS::Serverless::Function
    Condition: IsNotProduction
    Properties:
      FunctionName: !Sub "${AWS::StackName}-AuthorizationFunction"
      Description: "A lambda function that performs OAuth"
      Handler: authorize-handler.handler
      Role: !GetAtt AuthorizationFunctionRole.Arn
      KmsKeyArn: !GetAtt LambdaEnvironmentVariableEncryptionKey.Arn
      VpcConfig: !If
        - UseVpc
        - SecurityGroupIds:
            - Fn::ImportValue: !Sub "${VpcStackName}-AWSServicesEndpointSecurityGroupId"
          SubnetIds:
            - Fn::ImportValue: !Sub "${VpcStackName}-ProtectedSubnetIdA"
            - Fn::ImportValue: !Sub "${VpcStackName}-ProtectedSubnetIdB"
        - !Ref "AWS::NoValue"
      Environment:
        Variables:
          METRIC_SERVICE_NAME: "AuthorizationFunction"
          POWERTOOLS_METRICS_NAMESPACE:
            !If [IsDev, !Sub "${AWS::StackName}-AuthorizationFunction", "AuthorizationFunction"]
          POWERTOOLS_SERVICE_NAME: "AuthorizationFunction"
          ENVIRONMENT: !If [IsDev, "dev", !Ref Environment]
          APP_CONFIG_NAME: !Ref ApplicationConfigName
          APP_CONFIG_APPLICATION: !Ref ApplicationName
          SQS_AUDIT_EVENT_QUEUE_URL: !Ref AuditEventQueue
          COMPONENT_ID: !Ref ComponentId
      CodeSigningConfigArn: !If
        - UseCodeSigning
        - !Ref CodeSigningConfigArn
        - !Ref AWS::NoValue
      Tags:
        Product: !Ref ProductTagValue
        System: !Ref SystemTagValue
        Environment: !Ref Environment
        Owner: !Ref OwnerTagValue
        Source: !Ref SourceTagValue
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        UseNpmCi: True
        Minify: true
        Target: es2022
        Sourcemap: true
        SourcesContent: false
        EntryPoints:
          - src/handlers/authorize-handler/authorize-handler.ts
        Format: esm
        Platform: node
        OutExtension:
          - .js=.mjs
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  AuthorizationFunctionRole:
    Type: AWS::IAM::Role
    Condition: IsNotProduction
    Properties:
      RoleName: !Sub "${AWS::StackName}-AuthorizationFunctionRole"
      Description: !Sub "The role assumed by ${AWS::StackName}-AuthorizationFunction"
      PermissionsBoundary: !If
        - UsePermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref AWS::NoValue
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - "sts:AssumeRole"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - Fn::ImportValue: !Sub "${AppConfigStackName}-AppConfigClientPolicyArn"
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue

  AuthorizationFunctionPolicy:
    Type: AWS::IAM::Policy
    Condition: IsNotProduction
    Properties:
      PolicyName: !Sub "${AWS::StackName}-AuthorizationFunctionPolicy"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: "*"
          - Effect: Allow
            Action:
              - "secretsmanager:GetSecretValue" #pragma: allowlist secret
            Resource:
              - Fn::ImportValue: !Sub "${SharedStackName}-EVCSApiKeySecret"
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt AuditEventQueue.Arn
      Roles:
        - !Ref AuthorizationFunctionRole

  AuthorizationFunctionRestApiRole:
    Type: AWS::IAM::Role
    Condition: IsNotProduction
    Properties:
      RoleName: !Sub "${AWS::StackName}-AuthorizationFunctionRestApiRole"
      Description: !Sub "Roles for the AuthorizationFunction"
      PermissionsBoundary: !If [UsePermissionsBoundary, !Ref PermissionsBoundary, !Ref AWS::NoValue]
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action:
              - "sts:AssumeRole"
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue

  AuthorizationFunctionRestApiPolicy:
    Type: AWS::IAM::Policy
    Condition: IsNotProduction
    Properties:
      PolicyName: !Sub "${AWS::StackName}-AuthorizationFunctionRestApiPolicy"
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: "Allow"
            Action:
              - "lambda:InvokeFunction"
            Resource:
              - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-AuthorizationFunction:*"
      Roles:
        - !Ref AuthorizationFunctionRestApiRole

  AuthorizationFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-AuthorizationFunction"
      RetentionInDays: 30
      KmsKeyId: !GetAtt CloudWatchEncryptionKey.Arn
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "/aws/lambda/${AWS::StackName}-AuthorizationFunction"

  ################################
  # AUTHORIZATION LAMBDA         #
  ################################

  TokenFunction:
    Type: AWS::Serverless::Function
    Condition: IsNotProduction
    Properties:
      FunctionName: !Sub "${AWS::StackName}-TokenFunction"
      Description: "A lambda function that performs OAuth"
      Handler: token-handler.handler
      Role: !GetAtt TokenFunctionRole.Arn
      KmsKeyArn: !GetAtt LambdaEnvironmentVariableEncryptionKey.Arn
      VpcConfig: !If
        - UseVpc
        - SecurityGroupIds:
            - Fn::ImportValue: !Sub "${VpcStackName}-AWSServicesEndpointSecurityGroupId"
          SubnetIds:
            - Fn::ImportValue: !Sub "${VpcStackName}-ProtectedSubnetIdA"
            - Fn::ImportValue: !Sub "${VpcStackName}-ProtectedSubnetIdB"
        - !Ref "AWS::NoValue"
      Environment:
        Variables:
          METRIC_SERVICE_NAME: "TokenFunction"
          POWERTOOLS_METRICS_NAMESPACE: !If [IsDev, !Sub "${AWS::StackName}-TokenFunction", "TokenFunction"]
          POWERTOOLS_SERVICE_NAME: "TokenFunction"
          ENVIRONMENT: !If [IsDev, "dev", !Ref Environment]
          APP_CONFIG_NAME: !Ref ApplicationConfigName
          APP_CONFIG_APPLICATION: !Ref ApplicationName
          SQS_AUDIT_EVENT_QUEUE_URL: !Ref AuditEventQueue
          COMPONENT_ID: !Ref ComponentId
      CodeSigningConfigArn: !If
        - UseCodeSigning
        - !Ref CodeSigningConfigArn
        - !Ref AWS::NoValue
      Tags:
        Product: !Ref ProductTagValue
        System: !Ref SystemTagValue
        Environment: !Ref Environment
        Owner: !Ref OwnerTagValue
        Source: !Ref SourceTagValue
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        UseNpmCi: True
        Minify: true
        Target: es2022
        Sourcemap: true
        SourcesContent: false
        EntryPoints:
          - src/handlers/token-handler/token-handler.ts
        Format: esm
        Platform: node
        OutExtension:
          - .js=.mjs
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  TokenFunctionRole:
    Type: AWS::IAM::Role
    Condition: IsNotProduction
    Properties:
      RoleName: !Sub "${AWS::StackName}-TokenFunctionRole"
      Description: !Sub "The role assumed by ${AWS::StackName}-TokenFunction"
      PermissionsBoundary: !If
        - UsePermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref AWS::NoValue
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - "sts:AssumeRole"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - Fn::ImportValue: !Sub "${AppConfigStackName}-AppConfigClientPolicyArn"
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue

  TokenFunctionPolicy:
    Type: AWS::IAM::Policy
    Condition: IsNotProduction
    Properties:
      PolicyName: !Sub "${AWS::StackName}-TokenFunctionPolicy"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: "*"
          - Effect: Allow
            Action:
              - "secretsmanager:GetSecretValue" #pragma: allowlist secret
            Resource:
              - Fn::ImportValue: !Sub "${SharedStackName}-EVCSApiKeySecret"
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt AuditEventQueue.Arn
      Roles:
        - !Ref TokenFunctionRole

  TokenFunctionRestApiRole:
    Type: AWS::IAM::Role
    Condition: IsNotProduction
    Properties:
      RoleName: !Sub "${AWS::StackName}-TokenFunctionRestApiRole"
      Description: !Sub "Roles for the TokenFunction"
      PermissionsBoundary: !If [UsePermissionsBoundary, !Ref PermissionsBoundary, !Ref AWS::NoValue]
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action:
              - "sts:AssumeRole"
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue

  TokenFunctionRestApiPolicy:
    Type: AWS::IAM::Policy
    Condition: IsNotProduction
    Properties:
      PolicyName: !Sub "${AWS::StackName}-TokenFunctionRestApiPolicy"
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: "Allow"
            Action:
              - "lambda:InvokeFunction"
            Resource:
              - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-TokenFunction:*"
      Roles:
        - !Ref TokenFunctionRestApiRole

  TokenFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-TokenFunction"
      RetentionInDays: 30
      KmsKeyId: !GetAtt CloudWatchEncryptionKey.Arn
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "/aws/lambda/${AWS::StackName}-TokenFunction"

  PrivateApiTokenFunctionResourcePolicy:
    DependsOn: TokenFunctionAliaslive
    Condition: IsNotProduction
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Join
        - ":"
        - - "function"
          - !Select [6, !Split [":", !GetAtt TokenFunction.Arn]]
          - "live"
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PrivateApi}/${ApiStageName}/POST/*"

  PrivateApiDevTokenFunctionResourcePolicy:
    DependsOn: TokenFunctionAliaslive
    Condition: IsDev
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Join
        - ":"
        - - "function"
          - !Select [6, !Split [":", !GetAtt TokenFunction.Arn]]
          - "live"
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PrivateApiDev}/${ApiStageName}/POST/*"

  ################################
  # POST USER IDENTITY FEATURE  #
  ################################
  UserIdentityHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-UserIdentityHandlerFunction"
      Description: "A lambda function that queues SIS data for processing"
      Handler: user-identity-handler.handler
      Role: !GetAtt UserIdentityHandlerFunctionRole.Arn
