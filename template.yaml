            Action:
              - "lambda:InvokeFunction"
            Resource:
              - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-UserIdentityFunction:*"
      Roles:
        - !Ref UserIdentityRestApiRole

  UserIdentityFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${UserIdentityFunction}"
      RetentionInDays: 30
      KmsKeyId: !GetAtt CloudWatchEncryptionKey.Arn
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "/aws/lambda/${UserIdentityFunction}"

  MessageProcessorLambda:
    Type: AWS::Serverless::Function
    # checkov:skip=CKV_AWS_115: We do not have enough data to allocate the concurrent execution allowance per function.
    # checkov:skip=CKV_AWS_116: DLQs are not used for synchronous invocations.
    # checkov:skip=CKV_AWS_173: Check encryption settings for Lambda environmental variable
    DependsOn: MessageProcessorLambdaTriggerPolicy
    Properties:
      FunctionName: !Sub "${AWS::StackName}-MessageProcessorLambda"
      Description: Logs passed in VCs
      Handler: ais-message-handler.handler
      Role: !GetAtt MessageProcessorLambdaTriggerRole.Arn
      Environment:
        Variables:
          POWERTOOLS_METRICS_NAMESPACE:
            !If [IsDev, !Sub "${AWS::StackName}-TXMAMessageProcessor", "TXMAMessageProcessor"]
          POWERTOOLS_SERVICE_NAME: "MessagesReceived"
          EVCS_API_KEY_SECRET_ARN:
            Fn::ImportValue: !Sub "${SharedStackName}-EVCSApiKeySecret"
          ENVIRONMENT: !If [IsDev, "dev", !Ref Environment]
          APP_CONFIG_NAME: !Ref ApplicationConfigName
          APP_CONFIG_APPLICATION: !Ref ApplicationName
          SQS_AUDIT_EVENT_QUEUE_URL: !Ref AuditEventQueue
          COMPONENT_ID: !Ref ComponentId
      Tags:
        Product: !Ref ProductTagValue
        System: !Ref SystemTagValue
        Environment: !Ref Environment
        Owner: !Ref OwnerTagValue
        Source: !Ref SourceTagValue
        Name: !Sub "${AWS::StackName}-SecretsManagerEncryptionKey"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        UseNpmCi: True
        EntryPoints:
          - src/handlers/ais-message-processor/ais-message-handler.ts
        Sourcemap: true
        SourcesContent: false
        Target: "es2024"
        Format: esm
        Platform: node
        OutExtension:
          - .js=.mjs
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);

  MessageProcessorLambdaTriggerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-MessageProcessorLambdaTriggerRole"
      PermissionsBoundary: !If
        - UsePermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref AWS::NoValue
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - Fn::ImportValue: !Sub "${AppConfigStackName}-AppConfigClientPolicyArn"
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "${AWS::StackName}-MessageProcessorLambdaTriggerRole"

  MessageProcessorLambdaTriggerPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${AWS::StackName}-MessageProcessorLambdaTriggerPolicy"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
            Resource: !If
              - IsDevOrBuild
              - !GetAtt StubQueue.Arn
              - !FindInMap [EnvironmentMap, !Ref Environment, messageQueueArn]
          - Effect: Allow
            Action:
              - sqs:SendMessage
            Resource: !GetAtt AuditEventQueue.Arn
          - Effect: Allow
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: !If
              - IsDevOrBuild
              - !GetAtt StubQueueKey.Arn
              - !FindInMap [EnvironmentMap, !Ref Environment, messageQueueKeyArn]
          - Effect: Allow
            Action:
              - "secretsmanager:GetSecretValue" #pragma: allowlist secret
            Resource:
              - Fn::ImportValue: !Sub "${SharedStackName}-EVCSApiKeySecret"
          - Effect: Allow
            Action:
              - "kms:*"
            Resource: "*"
      Roles:
        - !Ref MessageProcessorLambdaTriggerRole

  MessageProcessorLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-MessageProcessorLambda"
      RetentionInDays: !Ref LogGroupRetentionInDays
      KmsKeyId: !GetAtt LoggingKmsKey.Arn

  MessageProcessorLambdaLogGroupSubscriptionFilter:
    Type: AWS::Logs::SubscriptionFilter
    Condition: IsNotDevOrBuild
    Properties:
      DestinationArn: !Ref CSLSSubscriptionEndpointArn
      FilterPattern: "{$._aws.CloudWatchMetrics NOT EXISTS}"
      LogGroupName: !Ref MessageProcessorLambdaLogGroup

  MessageProcessorLambdaErrorMetric:
    Type: AWS::Logs::MetricFilter
    Properties:
      FilterPattern: '{ $.level = "ERROR"}'
      LogGroupName: !Ref MessageProcessorLambdaLogGroup
      MetricTransformations:
        - MetricName: !Sub "${MessageProcessorLambda}-LambdaError"
          MetricNamespace: !Ref MainCloudWatchMetricNamespace
          MetricValue: "1"

  #######
  # API #
  #######
  APIGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt APIGatewayExecutionLogRole.Arn

  APIGatewayExecutionLogRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - apigateway.amazonaws.com
            Action: "sts:AssumeRole"
      Path: /
      ManagedPolicyArns:
        - >-
          arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

      PermissionsBoundary: !If [UsePermissionsBoundary, !Ref PermissionsBoundary, !Ref AWS::NoValue]
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "${AWS::StackName}-APIGatewayExecutionLogRole"

  DevPrivateRestApi:
    Condition: IsDev
    Type: AWS::Serverless::Api
    Properties:
      # checkov:skip=CKV_AWS_120: API Gateway caching not enabled
      Name: !Sub "${AWS::StackName}-DevPrivateRestApi"
      AlwaysDeploy: true
      OpenApiVersion: 3.0.3
      DefinitionBody:
        openapi: "3.0.3" # workaround to get `sam validate` to work
        paths: # workaround to get `sam validate` to work
          /never-created:
            options: {} # workaround to get `sam validate` to work
        Fn::Transform:
          Name: AWS::Include
          Parameters:
            Location: "openAPI/api.yaml"
      Description: "Regional Development API for the Private REST API that provides method to interact with post user identity"
      StageName: !Ref ApiStageName
      AccessLogSetting:
        Format: >-
          {
          "requestId": "$context.requestId",
          "requestTime": "$context.requestTime",
          "requestTimeEpoch": "$context.requestTimeEpoch",
          "httpMethod": "$context.httpMethod",
          "domainName": "$context.domainName",
          "path": "$context.path",
          "routeKey": "$context.routeKey",
          "protocol": "$context.protocol",
          "status": "$context.status",
          "responseLength": "$context.responseLength",
          "responseLatency": "$context.responseLatency",
          "authorizerLatency": "$context.authorizer.latency",
          "integrationStatus": "$context.integrationStatus",
          "integrationLatency": "$context.integrationLatency",
          "integrationErrorMessage": "$context.integrationErrorMessage",
          "errorMessage": "$context.error.message",
          "errorResponseType": "$context.error.responseType",
          "validationErrorString": "$context.error.validationErrorString",
          "xrayTraceId": "$context.xrayTraceId",
          "apiKeyId": "$context.identity.apiKeyId"
          }
        DestinationArn: !GetAtt APIGatewayAccessLogGroup.Arn
      MethodSettings:
        - LoggingLevel: INFO
          ResourcePath: "/*"
          HttpMethod: "*"
      CacheClusterEnabled: false
      TracingEnabled: true
      EndpointConfiguration:
        Type: REGIONAL
      DisableExecuteApiEndpoint: false
      Tags:
        CheckovRulesToSkip: CKV_AWS_120
        Product: !Ref ProductTagValue
        System: !Ref SystemTagValue
        Environment: !Ref Environment
        Owner: !Ref OwnerTagValue
        Source: !Ref SourceTagValue
        FMSRegionalPolicy: false
        CustomPolicy: true

  APIGatewayAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: IsDev
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${DevPrivateRestApi}/${ApiStageName}"
      RetentionInDays: 30
      KmsKeyId: !GetAtt CloudWatchEncryptionKey.Arn
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "/aws/apigateway/${DevPrivateRestApi}/${ApiStageName}"

  ########################
  # IPV Core Usage Plans #
  ########################
  IpvCoreApiUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Condition: IsDev
    DependsOn:
      - DevPrivateRestApiStage # This resource is created as part of the DevPrivateRestApi resource
    Properties:
      UsagePlanName: !Sub "${AWS::StackName}-IPV Core"
      Description: "Usage plan to limit and throttle call made by IPV Core"
      ApiStages:
        - ApiId: !Ref DevPrivateRestApi
          Stage: !Ref ApiStageName
          Throttle:
            "/user-identity/POST":
              RateLimit: !FindInMap [EnvironmentMap, !Ref Environment, ApiRateLimit]
              BurstLimit: !FindInMap [EnvironmentMap, !Ref Environment, ApiBurstLimit]

      Throttle:
        RateLimit: !FindInMap [EnvironmentMap, !Ref Environment, ApiRateLimit]
        BurstLimit: !FindInMap [EnvironmentMap, !Ref Environment, ApiBurstLimit]
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "${AWS::StackName}-IpvCoreApiUsagePlan"

  IpvCoreApiKey:
    Type: AWS::ApiGateway::ApiKey
    Condition: IsDev
    DependsOn:
      - DevPrivateRestApiStage # This resource is created as part of the RestApi resource
    Properties:
      Description: !Sub >-
        API Key for IPV Core.
        N.B. Does not auto-update if secret (/${AWS::StackName}/Config/API/Key/IPVCore) has changed!
      Enabled: true
      StageKeys:
        - RestApiId: !Ref DevPrivateRestApi
          StageName: !Ref ApiStageName
      # WARNING - does not get updated if IPVCoreApiKeySecret is updated - manual step in console
      # see https://repost.aws/knowledge-center/cloudformation-stack-update-secrets
      Value: !Sub "{{resolve:secretsmanager:${IPVCoreApiKeySecret}}}"
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "${AWS::StackName}-IpvCoreApiKey"

  SecretsManagerEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for encrypting secrets stored in Secrets Manager
      Enabled: true
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - kms:*
            Resource: "*"
          - Effect: Allow
            Principal:
              Service: secretsmanager.amazonaws.com
            Action:
              - "kms:Decrypt"
              - "kms:ReEncryptTo"
              - "kms:GenerateDataKey"
              - "kms:DescribeKey"
            Resource: "*"
            Condition:
              ArnLike:
                aws:SourceArn:
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/${AWS::StackName}/Config/*"

  SecretsManagerEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-SecretsManagerEncryptionKey"
      TargetKeyId: !GetAtt SecretsManagerEncryptionKey.Arn

  IPVCoreApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "/${AWS::StackName}/Config/API/Key/IPVCore"
      Description: >-
        Autogenerated API key for the IPV Core usage.
        N.B. Manually update IpvCoreApiKey's value upon change, does not auto-update!
      GenerateSecretString:
        ExcludeLowercase: false
        ExcludeNumbers: false
        ExcludePunctuation: true # avoids handling escaped chars
        ExcludeUppercase: false
        IncludeSpace: false # avoids handling escaped chars
        RequireEachIncludedType: true
        PasswordLength: 128
      KmsKeyId: !GetAtt SecretsManagerEncryptionKey.Arn
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "${AWS::StackName}-IPVCoreApiKeySecret"

  IpvCoreUsagePlanApiKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Condition: IsDev
    Properties:
      KeyId: !Ref IpvCoreApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref IpvCoreApiUsagePlan

  PerformanceTestApiUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Condition: IsBuild
    DependsOn:
      - PrivateRestApiStage
    Properties:
      UsagePlanName: !Sub "${AWS::StackName}-PerformanceTesting"
      Description: "Usage plan to limit and throttle call made by Performance Testing"
      ApiStages:
        - ApiId: !Ref PrivateRestApi
          Stage: !Ref ApiStageName
          Throttle:
            "/user-identity/POST":
              RateLimit: !FindInMap [EnvironmentMap, !Ref Environment, PerformanceTestApiRateLimit]
              BurstLimit: !FindInMap [EnvironmentMap, !Ref Environment, PerformanceTestApiBurstLimit]
      Throttle:
        RateLimit: !FindInMap [EnvironmentMap, !Ref Environment, PerformanceTestApiRateLimit]
        BurstLimit: !FindInMap [EnvironmentMap, !Ref Environment, PerformanceTestApiBurstLimit]
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "${AWS::StackName}-PerformanceTestingUsagePlan"

  PerformanceTestApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Condition: IsBuild
    Properties:
      Name: !Sub "/${AWS::StackName}/Config/API/Key/PerformanceTest"
      Description: >-
        Autogenerated API key for the PerformanceTest usage.
        N.B. Manually update PerformanceTestApiKey's value upon change, does not auto-update!
      GenerateSecretString:
        ExcludeLowercase: false
        ExcludeNumbers: false
        ExcludePunctuation: true # avoids handling escaped chars
        ExcludeUppercase: false
        IncludeSpace: false # avoids handling escaped chars
        RequireEachIncludedType: true
        PasswordLength: 128
      KmsKeyId: !GetAtt SecretsManagerEncryptionKey.Arn
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "${AWS::StackName}-PerformanceTestApiKeySecret"

  PerformanceTestApiKey:
    Type: AWS::ApiGateway::ApiKey
    Condition: IsBuild
    DependsOn:
      - PrivateRestApiStage # This resource is created as part of the RestApi resource
    Properties:
      Description: !Sub >-
        API Key for IPV Core.
        N.B. Does not auto-update if secret (/${AWS::StackName}/Config/API/Key/PerformanceTest) has changed!
      Enabled: true
      StageKeys:
        - RestApiId: !Ref PrivateRestApi
          StageName: !Ref ApiStageName
      # WARNING - does not get updated if IPVCoreApiKeySecret is updated - manual step in console
      # see https://repost.aws/knowledge-center/cloudformation-stack-update-secrets
      Value: !Sub "{{resolve:secretsmanager:${PerformanceTestApiKeySecret}}}"
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "${AWS::StackName}-PerformanceTestApiKey"

  PerformanceTestUsagePlanApiKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Condition: IsBuild
    Properties:
      KeyId: !Ref PerformanceTestApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref PerformanceTestApiUsagePlan

  IpvCorePrivateApiUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn:
      - PrivateRestApiStage # This resource is created as part of the PrivateRestApi resource
    Properties:
      UsagePlanName: !Sub "${AWS::StackName}-IPV Core"
      Description: "Usage plan to limit and throttle call made by IPV Core"
      ApiStages:
        - ApiId: !Ref PrivateRestApi
          Stage: !Ref ApiStageName
          Throttle:
            "/user-identity/POST":
              RateLimit: !FindInMap [EnvironmentMap, !Ref Environment, ApiRateLimit]
              BurstLimit: !FindInMap [EnvironmentMap, !Ref Environment, ApiBurstLimit]
      Throttle:
        RateLimit: !FindInMap [EnvironmentMap, !Ref Environment, ApiRateLimit]
        BurstLimit: !FindInMap [EnvironmentMap, !Ref Environment, ApiBurstLimit]
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "${AWS::StackName}-IpvCorePrivateApiUsagePlan"

  IpvCorePrivateApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn:
      - PrivateRestApiStage # This resource is created as part of the PrivateRestApi resource
    Properties:
      Name: !Sub "${AWS::StackName}-IpvCorePrivateApiKey-v1"
      Description: !Sub >-
        API Key for IPV Core.
        N.B. Does not auto-update if secret (/${AWS::StackName}/Config/PrivateAPI/Key/IPVCore) has changed!
      Enabled: true
      StageKeys:
        - RestApiId: !Ref PrivateRestApi
          StageName: !Ref ApiStageName
      # WARNING - does not get updated if IPVCorePrivateApiKeySecret is updated - manual step in console
      # see https://repost.aws/knowledge-center/cloudformation-stack-update-secrets
      Value: !Sub "{{resolve:secretsmanager:${IpvCorePrivateApiKeySecret}}}"
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "${AWS::StackName}-IpvCorePrivateApiKey"

  IpvCorePrivateApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "/${AWS::StackName}/Config/PrivateAPI/Key/IPVCore"
      Description: >-
        Autogenerated API key for the IPV Core usage.
        N.B. Manually update IpvCorePrivateApiKey's value upon change, does not auto-update!
      GenerateSecretString:
        ExcludeLowercase: false
        ExcludeNumbers: false
        ExcludePunctuation: true # avoids handling escaped chars
        ExcludeUppercase: false
        IncludeSpace: false # avoids handling escaped chars
        RequireEachIncludedType: true
        PasswordLength: 128
      KmsKeyId: !GetAtt SecretsManagerEncryptionKey.Arn
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "${AWS::StackName}-IpvCorePrivateApiKeySecret"

  IpvCoreUsagePlanPrivateApiKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref IpvCorePrivateApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref IpvCorePrivateApiUsagePlan

  LoggingKmsKey:
    Type: AWS::KMS::Key
    Properties:
      EnableKeyRotation: true
      KeyPolicy:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - kms:*
            Resource: "*"
          - Effect: Allow
            Principal:
              Service: !Sub "logs.${AWS::Region}.amazonaws.com"
            Action:
              - "kms:Encrypt*"
              - "kms:Decrypt*"
              - "kms:ReEncrypt*"
              - "kms:GenerateDataKey*"
              - "kms:Describe*"
            Resource: "*"
            Condition:
              ArnLike:
                "kms:EncryptionContext:aws:logs:arn": !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"
          - Effect: Allow
            Principal:
              Service: !Sub cloudwatch.amazonaws.com
            Action: kms:*
            Resource: "*"
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "${AWS::StackName}-LoggingKmsKey"

  CodeDeployServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Action:
              - sts:AssumeRole
            Effect: Allow
            Principal:
              Service:
                - codedeploy.amazonaws.com
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSCodeDeployRoleForLambda
      PermissionsBoundary: !If [UsePermissionsBoundary, !Ref PermissionsBoundary, !Ref AWS::NoValue]
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "${AWS::StackName}-CodeDeployServiceRole"

  StubQueueKey:
    Type: AWS::KMS::Key
    Condition: IsDevOrBuild
    Properties:
      Description: KMS key for encrypting SQS messages
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource: "*"

  AuditEventQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: !Ref AuditEventQueueEncryptionKeyAlias
      VisibilityTimeout: 70
      MessageRetentionPeriod: 1209600
      RedriveAllowPolicy:
        redrivePermission: denyAll
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AuditEventDeadLetterQueue.Arn
        maxReceiveCount: 10

  AuditEventDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: !Ref AuditEventQueueEncryptionKeyAlias

  AuditEventQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref AuditEventQueue
      PolicyDocument:
        Statement:
          - Sid: "AllowReadByTxMAAccount"
            Effect: Allow
            Action:
              - "sqs:ChangeMessageVisibility"
              - "sqs:DeleteMessage"
              - "sqs:GetQueueAttributes"
              - "sqs:ReceiveMessage"
            Resource: !GetAtt AuditEventQueue.Arn
            Principal:
              AWS: !FindInMap [EnvironmentMap, !Ref Environment, txmaAccountId]

  AuditEventQueueEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Symmetric key used to encrypt audit messages at rest in SQS
      EnableKeyRotation: true
      KeySpec: SYMMETRIC_DEFAULT
      KeyPolicy:
        Version: 2012-10-17
        Statement:
          - Sid: Enable Root access
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - "kms:*"
            Resource: "*"
          - Sid: Allow decryption of events by TxMA
            Effect: Allow
            Principal:
              AWS: !FindInMap [EnvironmentMap, !Ref Environment, txmaAccountId]
            Action:
              - "kms:decrypt"
            Resource: "*"
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Name
          Value: !Sub "${AWS::StackName}-AuditEventQueueEncryptionKey"
        - Key: Stack
          Value: !Sub "${AWS::StackName}"

  AuditEventQueueEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !If
        - IsDev
        - !Sub "alias/${AWS::StackName}/auditEventQueueEncryptionKey"
        - !Sub "alias/${Environment}/auditEventQueueEncryptionKey"
      TargetKeyId: !Ref AuditEventQueueEncryptionKey

  StubQueue:
    Type: AWS::SQS::Queue
    Condition: IsDevOrBuild
    Properties:
      QueueName: !Sub "${AWS::StackName}-stub-queue"
      KmsMasterKeyId: !Ref StubQueueKey

  MessageProcessorLambdaTrigger:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      BatchSize: 1
      EventSourceArn: !If
        - IsDevOrBuild
        - !GetAtt StubQueue.Arn
        - !FindInMap [EnvironmentMap, !Ref Environment, messageQueueArn]
      FunctionName: !GetAtt MessageProcessorLambda.Arn
      Enabled: true

  AuditEventDeadLetterQueueAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Triggers when any message is in the DLQ"
      Namespace: "AWS/SQS"
      MetricName: "ApproximateNumberOfMessagesVisible"
      Dimensions:
        - Name: QueueName
          Value: !Ref AuditEventDeadLetterQueue
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !ImportValue alerting-integration-AlertNotificationTopicArn
      TreatMissingData: notBreaching

  ########
  # KEYS #
  #######

  CloudWatchEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: AWS KMS key for encrypting CloudWatch logs
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Effect: Allow
            Principal:
              Service: !Sub "logs.${AWS::Region}.amazonaws.com"
            Action:
              - "kms:Encrypt*"
              - "kms:Decrypt*"
              - "kms:ReEncrypt*"
              - "kms:GenerateDataKey*"
              - "kms:Describe*"
            Resource: "*"
            Condition:
              ArnLike:
                "kms:EncryptionContext:aws:logs:arn": !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "${AWS::StackName}-CloudWatchEncryptionKey"

  CloudWatchEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-CloudWatchEncryptionKey"
      TargetKeyId: !GetAtt CloudWatchEncryptionKey.Arn

  LambdaEnvironmentVariableEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: "KMS key used to encrypt lambda environment variables"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - kms:*
            Resource: "*"
          - Effect: "Allow"
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - "kms:Decrypt"
            Resource: "*"
            Condition:
              ArnLike:
                "aws:SourceArn": !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*"
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "${AWS::StackName}-LambdaEnvironmentVariableEncryptionKey"

  LambdaEnvironmentVariableEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-LambdaEnvironmentVariableEncryptionKey"
      TargetKeyId: !GetAtt LambdaEnvironmentVariableEncryptionKey.Arn

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-LambdaErrorAlarm"
      AlarmDescription: "Errors invoking SIS lambda functions"
      Metrics:
        - Id: m1
          Label: MessageProcessorLambda Errors
          MetricStat:
            Metric:
              MetricName: Errors
              Namespace: AWS/Lambda
              Dimensions:
                - Name: FunctionName
                  Value: !Ref MessageProcessorLambda
            Period: 60
            Stat: Sum
            Unit: Count
          ReturnData: false
        - Id: m2
          Label: UserIdentityFunction Errors
          MetricStat:
            Metric:
              MetricName: Errors
              Namespace: AWS/Lambda
              Dimensions:
                - Name: FunctionName
                  Value: !Ref UserIdentityFunction
            Period: 60
            Stat: Sum
            Unit: Count
          ReturnData: false
        - Id: e1
          Label: Total Lambda Errors
          Expression: "m1 + m2"
          ReturnData: true
      DatapointsToAlarm: 1
      EvaluationPeriods: 1
      ComparisonOperator: GreaterThanThreshold
      Threshold: 0
      TreatMissingData: notBreaching
      ActionsEnabled:
        Fn::If:
          - IsNotDev
          - TRUE
          - FALSE
      AlarmActions:
        - !ImportValue alerting-integration-AlertNotificationTopicArn
      OKActions:
        - !ImportValue alerting-integration-AlertNotificationTopicArn

Outputs:
  ApiEndpoint:
    Description: The URL of the Stored Identity Service API
    Value: !If
      - IsDev
      - !Sub "https://${DevPrivateRestApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}"
      - !Sub "https://${PrivateRestApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}"

  ApiKeyPath:
    Description: The Path of the Stored Identity Service API Key in Secrets Manager
    Value: !If
      - IsDev
      - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:/${AWS::StackName}/Config/API/Key/IPVCore"
      - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret://${AWS::StackName}/Config/PrivateAPI/Key/IPVCore"

  AppConfigName:
    Condition: IsDevOrBuild
    Description: App Config name - used for testing.
    Value: !Ref ApplicationConfigName

  AppConfigApplication:
    Condition: IsDevOrBuild
    Description: App Config application name - used for testing.
    Value: !Ref ApplicationName

  AppConfigEnvironment:
    Condition: IsDevOrBuild
    Description: App Config environment - used for testing.
    Value: !Ref Environment

  SisPublicApi:
    Condition: IsNotProduction
    Description: "URL for the Stored Identity Service Public API"
    Value: !Sub "https://${PublicApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}"

  SisPrivateApi:
    Condition: IsNotProduction
    Description: "URL for the Stored Identity Service Private API"
    Value: !Sub "https://${PrivateApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}"

  SisPrivateApiAcceptanceTest:
    Condition: IsDevOrBuild
    Description: "URL for the Stored Identity Service Private API (development)"
    Value: !If
      - IsDev
      - !Sub "https://${PrivateApiDev}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}"
      - !Sub "https://${PrivateApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}"
