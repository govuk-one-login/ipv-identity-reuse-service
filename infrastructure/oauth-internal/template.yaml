AWSTemplateFormatVersion: 2010-09-09
Transform: AWS::Serverless-2016-10-31
Description: Common OAuth components for the Identity Reuse Service

Parameters:
  Environment:
    Type: String
    AllowedValues:
      - local
      - dev
      - build
      - staging
      - integration
      - production
    Default: local

  ApiStageName:
    Description: The stage name of the API
    Type: String
    Default: v1

  AuditComponentId:
    Description: The component ID used for audit events
    Type: String
    Default: https://identity.account.gov.uk/sis

  AuditEventNamePrefix:
    Description: The prefix used for the event name of an audit event
    Type: String
    Default: SIS

  CodeSigningConfigArn:
    Description: The ARN of the Code Signing Config to use, provided by the deployment pipeline
    Type: String
    Default: none

  CSLSSubscriptionEndpointArn:
    Description: CSLS Subscription endpoint
    Type: String
    Default: "arn:aws:logs:eu-west-2:885513274347:destination:csls_cw_logs_destination_prodpython-2"

  LambdaDeploymentPreference:
    Description: "Specifies the configuration to enable gradual Lambda deployments."
    Type: String
    Default: "AllAtOnce"
    AllowedValues:
      - AllAtOnce
      - Canary10Percent5Minutes
      - Canary10Percent10Minutes
      - Canary10Percent15Minutes
      - Canary10Percent30Minutes
      - Linear10PercentEvery10Minutes
      - Linear10PercentEvery1Minute
      - Linear10PercentEvery2Minutes
      - Linear10PercentEvery3Minutes
      - LambdaCanary50Percent5Minutes

  LogGroupRetentionInDays:
    Description: The number of days a log group should retain logs
    Type: Number
    MinValue: "1"
    Default: "30"

  MainCloudWatchMetricNamespace:
    Description: The name of the metric namespace
    Type: String
    Default: IdentityReuseService

  PermissionsBoundary:
    Description: The ARN of the permissions boundary to apply to any role created by the template
    Type: String
    Default: none

  SisStackName:
    Description: The name of the main SIS stack containing audit queue infrastructure
    Type: String
    Default: sis-main

  OAuthClientId:
    Description: "The client ID used by the main OAuth client"
    Type: String
    Default: "orchestrator"

  OwnerTagValue:
    Description: Value for the Owner Tag
    Type: String
    Default: trust_and_reuse@digital.cabinet-office.gov.uk

  ProductTagValue:
    Description: Value for the Product Tag
    Type: String
    Default: GOV.UK One Login

  SourceTagValue:
    Description: Value for the Source Tag
    Type: String
    Default: govuk-one-login/ipv-identity-reuse-service/infrastructure/oauth-internal/template.yaml

  SystemTagValue:
    Description: Value for the System Tag
    Type: String
    Default: Re-use identity service

  VpcStackName:
    Description: The name of the stack containing VPC infrastructure
    Type: String
    Default: vpc

Mappings:
  EnvironmentMap:
    "local":
      OrchestrationIssuer: "orchestrator"
      OrchestrationJwksEndpoint: "https://orch.reuse.dev.stubs.account.gov.uk/.well-known/jwks.json"
      OrchestrationRedirectURI: "https://orch.reuse.dev.stubs.account.gov.uk"
      SISAudience: "https://reuse-identity.dev.account.gov.uk"
    "dev":
      OrchestrationIssuer: "orchestrator"
      OrchestrationJwksEndpoint: "https://orch.reuse.dev.stubs.account.gov.uk/.well-known/jwks.json"
      OrchestrationRedirectURI: "https://orch.reuse.dev.stubs.account.gov.uk"
      SISAudience: "https://reuse-identity.dev.account.gov.uk"
    "build":
      OrchestrationIssuer: "orchestrator"
      OrchestrationJwksEndpoint: "https://orch.reuse.stubs.account.gov.uk/.well-known/jwks.json"
      OrchestrationRedirectURI: "https://orch.reuse.stubs.account.gov.uk"
      SISAudience: "https://reuse-identity.build.account.gov.uk"
    "staging":
      OrchestrationIssuer: "orchestrator"
      OrchestrationJwksEndpoint: none
      OrchestrationRedirectURI: none
      SISAudience: "https://reuse-identity.staging.account.gov.uk"
    "integration":
      OrchestrationIssuer: "orchestrator"
      OrchestrationJwksEndpoint: none
      OrchestrationRedirectURI: none
      SISAudience: "https://reuse-identity.integration.account.gov.uk"
    "production":
      OrchestrationIssuer: "orchestrator"
      OrchestrationJwksEndpoint: none
      OrchestrationRedirectURI: none
      SISAudience: "https://reuse-identity.account.gov.uk"

Conditions:
  IsDev:
    Fn::Or:
      - Fn::Equals: [ !Ref Environment, "local" ]
      - Fn::Equals: [ !Ref Environment, "dev" ]

  IsDevOrBuild:
    Fn::Or:
      - Fn::Equals: [ !Ref Environment, "local" ]
      - Fn::Equals: [ !Ref Environment, "dev" ]
      - Fn::Equals: [ !Ref Environment, "build" ]

  IsNotProduction:
    Fn::Or:
      - Fn::Equals: [ !Ref Environment, "local" ]
      - Fn::Equals: [ !Ref Environment, "dev" ]
      - Fn::Equals: [ !Ref Environment, "build" ]
      - Fn::Equals: [ !Ref Environment, "staging" ]

Resources:
  OAuthCommon:
    Type: AWS::Serverless::Application
    Condition: IsNotProduction
    Properties:
      Location:
        ApplicationId: arn:aws:serverlessrepo:eu-west-2:667736788427:applications/di-ipv-cri-oauth-common
        SemanticVersion: 0.5.0
      Parameters:
        AuditEventNamePrefix: !Ref AuditEventNamePrefix
        AuditTxmaStackName: !Ref SisStackName # TXMA infrastructure lives in the identity-reuse-service stack
        CSLSDestinationArn: !Ref CSLSSubscriptionEndpointArn
        CriIdentifier: !Ref MainCloudWatchMetricNamespace # Used for the metrics namespace and metrics service names only
        CriAudience: !FindInMap [ EnvironmentMap, !Ref Environment, SISAudience ] # Sets the Audience value for the SIS OAuth 2.0 server
        CriVcIssuer: !Ref AuditComponentId # Used for the component ID in audit events only
        CriPrivateApiGwName: !Sub "${AWS::StackName}-PrivateApi" # Used to create canary deployment alarms for the stack
        CriPublicApiGwName: !Sub "${AWS::StackName}-PrivateApi" # This will become the external facing private API when the /token endpoint moves there
        Environment: !If [IsDev, dev, !Ref Environment ]
        IPVCoreRedirectURI: !FindInMap [ EnvironmentMap, !Ref Environment, OrchestrationRedirectURI ] # The expected client redirect URI (used in staging upwards)
        IPVCoreStubJwksEndpoint: !FindInMap [ EnvironmentMap, !Ref Environment, OrchestrationJwksEndpoint ] # The expected client JWKS endpoint (used in non-prod)
        IsCredentialIssuer: "false"
        LambdaCodeSigningConfigArn: !Ref CodeSigningConfigArn
        LambdaDeploymentPreference: !Ref LambdaDeploymentPreference
        LambdaVpcConfiguration: "di-devplatform-deploy"
        PermissionsBoundaryArn: !Ref PermissionsBoundary
        VpcStackNameOverride: !Ref VpcStackName

  PrivateApi:
    Type: AWS::Serverless::Api
    Condition: IsNotProduction
    Properties:
      Name: !Sub "${AWS::StackName}-PrivateApi"
      AlwaysDeploy: true
      OpenApiVersion: 3.0.3
      PropagateTags: true
      DefinitionBody:
        openapi: "3.0.3" # workaround to get `sam validate` to work
        paths: # workaround to get `sam validate` to work
          /never-created:
            options: { } # workaround to get `sam validate` to work
        Fn::Transform:
          Name: AWS::Include
          Parameters:
            Location: "../../openAPI/oauth-common-private-api.yaml"
      Description: "A private API internal to SIS to serve the OAuth Common helper endpoints"
      StageName: !Ref ApiStageName
      Auth:
        ResourcePolicy:
          IntrinsicVpcWhitelist:
            - Fn::ImportValue: !Sub "${VpcStackName}-VpcId"
      AccessLogSetting:
        Format: >-
          {
          "requestId": "$context.requestId",
          "requestTime": "$context.requestTime",
          "requestTimeEpoch": "$context.requestTimeEpoch",
          "httpMethod": "$context.httpMethod",
          "domainName": "$context.domainName",
          "path": "$context.path",
          "routeKey": "$context.routeKey",
          "protocol": "$context.protocol",
          "status": "$context.status",
          "responseLength": "$context.responseLength",
          "responseLatency": "$context.responseLatency",
          "authorizerLatency": "$context.authorizer.latency",
          "integrationStatus": "$context.integrationStatus",
          "integrationLatency": "$context.integrationLatency",
          "integrationErrorMessage": "$context.integrationErrorMessage",
          "errorMessage": "$context.error.message",
          "errorResponseType": "$context.error.responseType",
          "validationErrorString": "$context.error.validationErrorString",
          "xrayTraceId": "$context.xrayTraceId",
          "apiKeyId": "$context.identity.apiKeyId"
          }
        DestinationArn: !GetAtt PrivateApiAccessLogGroup.Arn
      CacheClusterEnabled: false
      TracingEnabled: true
      MethodSettings:
        - MetricsEnabled: true
          LoggingLevel: INFO
          ResourcePath: /*
          HttpMethod: "*"
      EndpointConfiguration:
        Type: PRIVATE
      Tags:
        Product: !Ref ProductTagValue
        System: !Ref SystemTagValue
        Environment: !Ref Environment
        Owner: !Ref OwnerTagValue
        Source: !Ref SourceTagValue
        FMSRegionalPolicy: false
        CustomPolicy: idprivateapi

  PrivateApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: IsNotProduction
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${AWS::StackName}-PrivateApi/${ApiStageName}"
      RetentionInDays: !Ref LogGroupRetentionInDays
      KmsKeyId: !GetAtt CloudWatchEncryptionKey.Arn
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "/aws/apigateway/${AWS::StackName}-PrivateApi/${ApiStageName}"

  CloudWatchEncryptionKey:
    Type: AWS::KMS::Key
    Condition: IsNotProduction
    Properties:
      Description: AWS KMS key for encrypting CloudWatch logs
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Effect: Allow
            Principal:
              Service: !Sub "logs.${AWS::Region}.amazonaws.com"
            Action:
              - "kms:Encrypt*"
              - "kms:Decrypt*"
              - "kms:ReEncrypt*"
              - "kms:GenerateDataKey*"
              - "kms:Describe*"
            Resource: "*"
            Condition:
              ArnLike:
                "kms:EncryptionContext:aws:logs:arn": !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub "${AWS::StackName}-CloudWatchEncryptionKey"

  IPVCoreAuthenticationAlgParameter:
    Type: AWS::SSM::Parameter
    Condition: IsDevOrBuild
    Properties:
      Name: !Sub "/${OAuthCommon.Outputs.StackName}/clients/${OAuthClientId}/jwtAuthentication/authenticationAlg"
      Type: String
      Value: ES256

  IPVCoreAudienceParameter:
    Type: AWS::SSM::Parameter
    Condition: IsDevOrBuild
    Properties:
      Name: !Sub "/${OAuthCommon.Outputs.StackName}/clients/${OAuthClientId}/jwtAuthentication/audience"
      Type: String
      Value: !FindInMap [ EnvironmentMap, !Ref Environment, SISAudience ]

  IPVCoreIssuerParameter:
    Type: AWS::SSM::Parameter
    Condition: IsNotProduction
    Properties:
      Name: !Sub "/${OAuthCommon.Outputs.StackName}/clients/${OAuthClientId}/jwtAuthentication/issuer"
      Type: String
      Value: !FindInMap [EnvironmentMap, !Ref "Environment", OrchestrationIssuer]

  IPVCoreRedirectURIParameter:
    Type: AWS::SSM::Parameter
    Condition: IsDevOrBuild
    Properties:
      Name: !Sub "/${OAuthCommon.Outputs.StackName}/clients/${OAuthClientId}/jwtAuthentication/redirectUri"
      Type: String
      Value: !FindInMap [ EnvironmentMap, !Ref Environment, OrchestrationRedirectURI ]

  IPVCoreJwksEndpointParameter:
    Type: AWS::SSM::Parameter
    Condition: IsNotProduction
    Properties:
      Name: !Sub "/${OAuthCommon.Outputs.StackName}/clients/${OAuthClientId}/jwtAuthentication/jwksEndpoint"
      Type: String
      Value: !FindInMap [ EnvironmentMap, !Ref Environment, OrchestrationJwksEndpoint ]

Outputs:
  PrivateApi:
    Condition: IsNotProduction
    Description: "The URL for the OAuth internal private API"
    Value: !Sub "https://${PrivateApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}"
    Export:
      Name: !Sub ${AWS::StackName}-PrivateApi
