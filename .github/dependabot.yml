# See also: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
      - dependency-name: "@pact-foundation/pact"
        versions: ["v16.4.0", "v16.3.1", "v16.3.0"]
      - dependency-name: "typescript"
        # TypeScript 6.0.0 has breaking changes, so delaying the upgrade until we have capacity to work out the issues
        versions: [ "6.x" ]
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: "-"
    groups:
      production-dependencies:
        dependency-type: "production"
        patterns:
          - "*"
      development-dependencies:
        dependency-type: "development"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    # Workflow files stored in the default location of `.github/workflows`
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    pull-request-branch-name:
      separator: "-"
