name: publish-test-image

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
        default: build
    secrets:
      aws-role-arn:
        required: true
        description: >
          The Amazon Resource Name (ARN) of the role to assume. Use the provided
          credentials to assume an IAM role and configure the Actions
          environment with the assumed role credentials rather than with the
          provided credentials.
      ecr-repository:
        required: true
        description: >
          The URL of the ECR repository to publish the test image to.

concurrency:
  group: publish-test-image-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  packages: read

jobs:
  build-test-image:
    name: Build Test Image
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
      packages: read
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Assume AWS Role
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ secrets.aws-role-arn }}
          aws-region: "eu-west-2"

      - name: Login to Amazon ECR
        id: login-to-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Set Build Environment Variables
        run: echo "BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"" >> $GITHUB_ENV

      - name: Build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          platforms: linux/amd64
          file: tests/acceptance/Dockerfile
          push: "true"
          tags: ${{ secrets.ecr-repository }}:latest
          secrets: | # pragma: allowlist secret
            node-auth-token=${{ secrets.GITHUB_TOKEN }}
          secret-files: |
            npmrc=${{ env.NPM_CONFIG_USERCONFIG }}
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            COMMIT_SHA=${{ github.sha }}
            GIT_REPO=${{ github.repository }}
